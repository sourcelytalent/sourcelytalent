document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ec0c2711-7465-49c9-bdbb-26ecc6dced8b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Quicksand';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"daf6cd6f-0e08-4ac9-8fef-27c066c2f69b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    :root {\n      --teal: #25C0B1;\n      --teal-deep: #0FB9A4;\n      --teal-tint: #E6F4F1;\n      --teal-soft: #F0F9F6;\n      --navy: #005878;\n      --navy-deep: #003e54;\n      --cream: #FFFFFF;\n      --paper: #FFFFFF;\n      --paper-deep: #F4F6F7;\n      --ink: #1F3A4A;\n      --muted: #6B8395;\n      --muted-soft: #92A5B3;\n      --line: rgba(0, 88, 120, 0.14);\n      --line-soft: rgba(0, 88, 120, 0.08);\n    }\n\n    html, body { min-height: 100%; background: linear-gradient(180deg, #ffffff 0%, rgba(15, 185, 164, 0.05) 100%); background-attachment: fixed; }\n    body {\n      font-family: 'Nunito', -apple-system, system-ui, sans-serif;\n      color: var(--ink);\n      line-height: 1.6;\n      overflow-x: hidden;\n    }\n    a { color: inherit; text-decoration: none; }\n    img { display: block; max-width: 100%; }\n\n    /* ───── Reusable type ───── */\n    .eyebrow {\n      font-family: 'Quicksand', sans-serif;\n      font-size: 0.74rem;\n      font-weight: 700;\n      letter-spacing: 0.28em;\n      text-transform: uppercase;\n      color: var(--teal-deep);\n      display: inline-flex;\n      align-items: baseline;\n      gap: 12px;\n    }\n    .eyebrow .num {\n      color: var(--muted-soft);\n      font-weight: 500;\n      letter-spacing: 0.18em;\n    }\n    .eyebrow.on-dark { color: var(--teal); }\n    .eyebrow.on-dark .num { color: rgba(255,255,255,0.45); }\n\n    .display {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 500;\n      line-height: 1.02;\n      letter-spacing: -0.024em;\n      color: var(--navy-deep);\n    }\n    .display em { font-style: normal; font-weight: 600; color: var(--teal-deep); }\n    .smile-e {\n      display: inline-block;\n      height: 0.78em;\n      width: 0.78em;\n      vertical-align: -0.06em;\n      margin: 0 -0.04em 0 -0.06em;\n    }\n\n\n    /* ───── Top rail ───── */\n    /* ───── Floating Top Nav ───── */\n    body { padding-top: 96px; }\n    .rail {\n      position: fixed;\n      top: 16px;\n      left: 50%;\n      transform: translateX(-50%);\n      width: calc(100% - 40px);\n      max-width: 1240px;\n      margin: 0;\n      padding: 10px 14px 10px 22px;\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      background: rgba(255, 255, 255, 0.85);\n      backdrop-filter: saturate(160%) blur(14px);\n      -webkit-backdrop-filter: saturate(160%) blur(14px);\n      border: 1px solid var(--line);\n      border-radius: 999px;\n      box-shadow: 0 12px 36px rgba(0, 88, 120, 0.08), 0 1px 0 rgba(255,255,255,0.6) inset;\n      z-index: 100;\n      transition: top 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, padding 0.25s ease;\n    }\n    .rail.scrolled {\n      top: 10px;\n      padding: 8px 14px 8px 22px;\n      background: rgba(255, 255, 255, 0.96);\n      box-shadow: 0 16px 44px rgba(0, 88, 120, 0.14), 0 1px 0 rgba(255,255,255,0.6) inset;\n    }\n    .rail-logo img { height: 36px; }\n    .rail-meta {\n      display: flex;\n      gap: 28px;\n      font-family: 'Quicksand', sans-serif;\n      font-size: 0.68rem;\n      font-weight: 600;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      color: var(--muted);\n    }\n    .rail-meta-item { display: flex; align-items: center; gap: 9px; }\n    /* Animated globe network of cities */\n    .rail-network {\n      display: flex;\n      align-items: center;\n      gap: 0;\n      font-family: 'Quicksand', sans-serif;\n      font-size: 0.66rem;\n      font-weight: 600;\n      letter-spacing: 0.16em;\n      text-transform: uppercase;\n      color: var(--muted);\n    }\n    .rail-network .globe {\n      width: 14px; height: 14px;\n      margin-right: 12px;\n      color: var(--teal-deep);\n      flex-shrink: 0;\n      animation: spin 22s linear infinite;\n    }\n    @keyframes spin { to { transform: rotate(360deg); } }\n    .rail-cities {\n      position: relative;\n      display: flex;\n      align-items: center;\n      padding: 6px 4px;\n      overflow: hidden;\n    }\n    .rail-cities::before {\n      content: '';\n      position: absolute;\n      top: 50%;\n      left: 6px; right: 6px;\n      height: 1px;\n      background: linear-gradient(90deg,\n        transparent 0%,\n        rgba(0,88,120,0.18) 12%,\n        rgba(0,88,120,0.18) 88%,\n        transparent 100%);\n      transform: translateY(-0.5px);\n      z-index: 0;\n    }\n    .rail-cities::after {\n      content: '';\n      position: absolute;\n      top: 50%;\n      left: 0;\n      width: 22%;\n      height: 1px;\n      background: linear-gradient(90deg, transparent 0%, var(--teal) 50%, transparent 100%);\n      transform: translateY(-0.5px);\n      z-index: 1;\n      animation: pulse-trace 5s ease-in-out infinite;\n    }\n    @keyframes pulse-trace {\n      0%   { left: -10%; opacity: 0; }\n      8%   { opacity: 1; }\n      92%  { opacity: 1; }\n      100% { left: 100%; opacity: 0; }\n    }\n    .rail-city {\n      position: relative;\n      z-index: 2;\n      display: flex;\n      align-items: center;\n      gap: 6px;\n      padding: 0 10px;\n      background: rgba(255,255,255,0.85);\n    }\n    .rail-city .node {\n      width: 5px; height: 5px;\n      border-radius: 50%;\n      background: var(--teal);\n      box-shadow: 0 0 0 2px rgba(68,184,171,0.18);\n    }\n    .rail-city:nth-child(odd) .node { animation: blink 4.4s ease-in-out infinite; }\n    .rail-city:nth-child(even) .node { animation: blink 4.4s ease-in-out infinite; animation-delay: 1.2s; }\n    .rail-city:nth-child(3n) .node { animation-delay: 2.2s; }\n    @keyframes blink {\n      0%, 100% { box-shadow: 0 0 0 2px rgba(68,184,171,0.18); background: var(--teal); }\n      50%      { box-shadow: 0 0 0 5px rgba(68,184,171,0.0); background: var(--teal-deep); }\n    }\n    .rail-status {\n      width: 8px; height: 8px;\n      border-radius: 50%;\n      background: var(--teal);\n      box-shadow: 0 0 0 3px rgba(64,192,184,0.18);\n      animation: pulse 2.4s ease-in-out infinite;\n    }\n    @keyframes pulse {\n      0%, 100% { box-shadow: 0 0 0 3px rgba(64,192,184,0.18); }\n      50% { box-shadow: 0 0 0 6px rgba(64,192,184,0.04); }\n    }\n    .rail-cta {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 700;\n      font-size: 0.74rem;\n      letter-spacing: 0.14em;\n      text-transform: uppercase;\n      color: white;\n      padding: 11px 20px;\n      border: none;\n      background: var(--navy);\n      border-radius: 999px;\n      cursor: pointer;\n      transition: all 0.2s;\n    }\n    .scrollbtn-toggle, .rail-cta { white-space: nowrap; }\n\n    /* ───── Hero ───── */\n    .hero {\n      max-width: 1280px;\n      margin: 0 auto;\n      padding: 88px 40px 120px;\n      display: grid;\n      grid-template-columns: minmax(0, 7fr) minmax(0, 5fr);\n      gap: 80px;\n      align-items: start;\n      position: relative;\n    }\n    .hero-marker { margin-bottom: 32px; }\n    .hero h1 {\n      font-size: clamp(3.2rem, 6.4vw, 5.8rem);\n      margin-bottom: 36px;\n    }\n\n    .hero-tag {\n      font-size: 1.18rem;\n      line-height: 1.55;\n      color: var(--muted);\n      margin-bottom: 44px;\n      max-width: 540px;\n    }\n    .hero-cta-row {\n      display: flex;\n      align-items: center;\n      gap: 28px;\n      flex-wrap: wrap;\n    }\n    .btn-primary {\n      display: inline-flex;\n      align-items: center;\n      gap: 14px;\n      background: var(--navy);\n      color: white;\n      padding: 18px 26px 18px 22px;\n      border-radius: 999px;\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 700;\n      font-size: 0.95rem;\n      letter-spacing: 0.01em;\n      cursor: pointer;\n      border: none;\n      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;\n    }\n    .btn-primary:hover {\n      background: var(--teal-deep);\n      transform: translateY(-1px);\n      box-shadow: 0 14px 30px rgba(0,88,120,0.18);\n    }\n    .btn-primary img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }\n    .btn-primary .arrow { transition: transform 0.2s; }\n    .btn-primary:hover .arrow { transform: translateX(3px); }\n    .hero-note {\n      font-style: italic;\n      font-size: 0.95rem;\n      color: var(--muted);\n    }\n\n    /* Hero aside — quote card */\n    .hero-aside {\n      position: relative;\n      padding-top: 48px;\n    }\n    .aside-sticker { display: block; margin-bottom: 18px; }\n    .aside-sticker img { width: 50%; height: auto; display: block; margin: 0 auto; }\n    .quote-card {\n      background: white;\n      border: 1px solid var(--line);\n      border-radius: 4px;\n      padding: 28px 28px 22px;\n      box-shadow: 0 18px 44px rgba(0, 88, 120, 0.07);\n      position: relative;\n      max-width: 420px;\n      margin-left: auto;\n    }\n    .quote-card::before {\n      content: '';\n      position: absolute;\n      top: 0; left: 22px; right: 22px;\n      height: 2px;\n      background: var(--teal);\n    }\n    .quote-mark {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 700;\n      font-size: 2.4rem;\n      line-height: 0.5;\n      color: var(--teal);\n      margin-bottom: 12px;\n    }\n    .quote-text {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 500;\n      font-size: 1.1rem;\n      line-height: 1.4;\n      letter-spacing: -0.005em;\n      color: var(--navy-deep);\n      margin-bottom: 18px;\n    }\n    .quote-attr {\n      font-family: 'Quicksand', sans-serif;\n      font-size: 0.66rem;\n      font-weight: 600;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      color: var(--muted);\n      padding-top: 12px;\n      border-top: 1px solid var(--line);\n    }\n    .quote-attr strong {\n      color: var(--navy);\n      display: block;\n      margin-bottom: 4px;\n      letter-spacing: 0.14em;\n    }\n\n\n    /* Hero stat strip — small marquee of headline numbers */\n    .hero-strip {\n      grid-column: 1 / -1;\n      margin-top: 24px;\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 0;\n      border-top: 1px solid var(--line);\n      padding-top: 32px;\n    }\n    .hero-strip-item {\n      padding-right: 28px;\n      border-right: 1px solid var(--line);\n    }\n    .hero-strip-item:last-child { border-right: none; padding-right: 0; }\n    .hero-strip-item:not(:first-child) { padding-left: 28px; }\n    .hero-strip-num {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 600;\n      font-size: 2rem;\n      letter-spacing: -0.02em;\n      color: var(--navy-deep);\n      margin-bottom: 4px;\n    }\n    .hero-strip-num em { font-style: normal; color: var(--teal-deep); }\n    .hero-strip-label {\n      font-family: 'Quicksand', sans-serif;\n      font-size: 0.7rem;\n      font-weight: 600;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      color: var(--muted);\n    }\n\n    /* ───── Band: Promise / Differentiator ───── */\n    .band {\n      background: linear-gradient(180deg, rgba(15, 185, 164, 0.025) 0%, rgba(15, 185, 164, 0.055) 100%);\n      border-top: 1px solid var(--line);\n      border-bottom: 1px solid var(--line);\n      padding: 96px 0;\n    }\n    .band-inner {\n lay: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 0;\n      position: relative;\n      border-top: 1px solid var(--line);\n    }\n    .process-grid::before {\n      content: '';\n      position: absolute;\n      top: 0; left: 0; right: 0;\n      height: 2px;\n      background: linear-gradient(90deg, var(--teal) 0%, var(--teal) 25%, var(--teal-deep) 25%, var(--teal-deep) 50%, var(--navy) 50%, var(--navy) 75%, var(--navy-deep) 75%, var(--navy-deep) 100%);\n    }\n    .step {\n      padding: 36px 32px 8px 0;\n      position: relative;\n    }\n    .step:not(:last-child) { padding-right: 28px; }\n    .step:not(:first-child) { padding-left: 24px; border-left: 1px solid var(--line); }\n    .step-num {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 600;\n      font-size: 0.78rem;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--teal-deep);\n      margin-bottom: 18px;\n      display: flex;\n      align-items: center;\n      gap: 14px;\n    }\n    .step-num::before {\n      content: '';\n      width: 28px; height: 1px;\n      background: var(--teal);\n    }\n    .step-name {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 600;\n      font-size: 1.55rem;\n      letter-spacing: -0.014em;\n      color: var(--navy-deep);\n      margin-bottom: 14px;\n      line-height: 1.18;\n    }\n    .step-desc {\n      font-size: 0.98rem;\n      line-height: 1.6;\n      color: var(--muted);\n      margin-bottom: 22px;\n    }\n    .step-list {\n      list-style: none;\n      padding: 0;\n      margin: 0;\n    }\n    .step-list li {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 500;\n      font-size: 0.85rem;\n      color: var(--navy);\n      padding: 9px 0;\n      border-top: 1px dashed var(--line);\n      display: flex;\n      align-items: center;\n      gap: 10px;\n    }\n    .step-list li::before {\n      content: '';\n      width: 5px; height: 5px;\n      border-radius: 50%;\n      background: var(--teal);\n      flex-shrink: 0;\n    }\n\n    /* ───── Time-to-source proof ───── */\n    .proof {\n      background: var(--navy-deep);\n      color: white;\n      padding: 110px 0;\n      position: relative;\n      overflow: hidden;\n    }\n    .proof::before {\n      content: '';\n      position: absolute;\n      top: -200px; right: -200px;\n      width: 600px; height: 600px;\n      background: radial-gradient(circle, rgba(64,192,184,0.16) 0%, transparent 65%);\n      pointer-events: none;\n    }\n    .proof::after {\n      content: '';\n      position: absolute;\n      bottom: -160px; left: -160px;\n      width: 480px; height: 480px;\n      background: radial-gradient(circle, rgba(64,192,184,0.08) 0%, transparent 70%);\n      pointer-events: none;\n    }\n    .proof-inner {\n      max-width: 1280px;\n      margin: 0 auto;\n      padding: 0 40px;\n      position: relative;\n      z-index: 2;\n    }\n    .proof-head {\n      display: grid;\n      grid-template-columns: minmax(0, 5fr) minmax(0, 7fr);\n      gap: 96px;\n      align-items: end;\n      margin-bottom: 72px;\n    }\n    .proof-head .eyebrow { color: var(--teal); margin-bottom: 18px; }\n    .proof-head .eyebrow .num { color: rgba(255,255,255,0.4); }\n    .proof-title {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 500;\n      font-size: clamp(2.2rem, 4vw, 3.6rem);\n      line-height: 1.05;\n      letter-spacing: -0.022em;\n      color: white;\n    }\n    .proof-title em { font-style: normal; font-weight: 600; color: var(--teal); }\n    .proof-blurb {\n      font-size: 1.05rem;\n      line-height: 1.65;\n      color: rgba(255,255,255,0.7);\n      max-width: 520px;\n    }\n\n    /* Comparison chart */\n    .chart {\n      background: rgba(255,255,255,0.03);\n      border: 1px solid rgba(255,255,255,0.08);\n      border-radius: 6px;\n      padding: 44px 44px 38px;\n    }\n    .chart-meta {\n      display: flex;\n      justify-content: space-between;\n      align-items: basel yle: italic;\n      font-size: 0.92rem;\n      color: rgba(255,255,255,0.55);\n      max-width: 380px;\n      line-height: 1.55;\n    }\n    .foot-meta {\n      text-align: right;\n      font-family: 'Quicksand', sans-serif;\n      font-size: 0.82rem;\n      color: rgba(255,255,255,0.55);\n      line-height: 1.7;\n    }\n    .foot-locations {\n      font-size: 0.7rem;\n      letter-spacing: 0.2em;\n      text-transform: uppercase;\n      color: rgba(255,255,255,0.7);\n      margin-bottom: 12px;\n    }\n    .foot-locations span { color: var(--teal); margin: 0 8px; }\n    .foot-meta a { color: white; border-bottom: 1px solid var(--teal); }\n    .foot-bottom {\n      max-width: 1280px;\n      margin: 56px auto 0;\n      padding: 22px 40px 0;\n      border-top: 1px solid rgba(255,255,255,0.08);\n      display: flex;\n      justify-content: space-between;\n      font-family: 'Quicksand', sans-serif;\n      font-size: 0.74rem;\n      letter-spacing: 0.14em;\n      text-transform: uppercase;\n      color: rgba(255,255,255,0.45);\n    }\n\n    /* ───── Modal ───── */\n    .modal-overlay {\n      position: fixed; inset: 0;\n      background: rgba(0, 62, 84, 0.45);\n      backdrop-filter: blur(8px);\n      -webkit-backdrop-filter: blur(8px);\n      z-index: 200;\n      display: none;\n      align-items: center;\n      justify-content: center;\n      padding: 20px;\n      opacity: 0;\n      transition: opacity 0.25s ease;\n    }\n    .modal-overlay.open { display: flex; opacity: 1; }\n    .modal {\n      background: var(--cream);\n      border-radius: 8px;\n      width: 100%;\n      max-width: 540px;\n      max-height: calc(100vh - 40px);\n      overflow-y: auto;\n      padding: 44px 44px 36px;\n      box-shadow: 0 30px 80px rgba(0,62,84,0.3);\n      transform: translateY(12px) scale(0.98);\n      transition: transform 0.3s cubic-bezier(.2,.8,.2,1);\n      position: relative;\n      border-top: 4px solid var(--teal);\n    }\n    .modal-overlay.open .modal { transform: translateY(0) scale(1); }\n    .modal-close {\n      position: absolute;\n      top: 16px; right: 16px;\n      width: 36px; height: 36px;\n      border-radius: 50%;\n      background: transparent;\n      border: 1px solid var(--line);\n      cursor: pointer;\n      font-size: 1rem;\n      color: var(--muted);\n      display: flex; align-items: center; justify-content: center;\n    }\n    .modal-title-row { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }\n    .modal-title-row img { width: 48px; height: 48px; object-fit: contain; flex-shrink: 0; }\n    .modal-title-row h2 { margin-bottom: 0 !important; }\n    .modal h2 {\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 600;\n      font-size: 1.85rem;\n      letter-spacing: -0.012em;\n      color: var(--navy-deep);\n      margin-bottom: 8px;\n    }\n    .modal-sub { font-size: 0.95rem; color: var(--muted); margin-bottom: 26px; }\n    .form-row { margin-bottom: 16px; }\n    .form-row.split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n    .form-row label {\n      display: block;\n      font-family: 'Quicksand', sans-serif;\n      font-size: 0.74rem;\n      font-weight: 700;\n      color: var(--navy);\n      margin-bottom: 6px;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n    }\n    .form-row label .opt {\n      color: var(--muted);\n      font-weight: 500;\n      text-transform: none;\n      letter-spacing: 0;\n    }\n    .form-row input,\n    .form-row select,\n    .form-row textarea {\n      width: 100%;\n      font-family: 'Nunito', sans-serif;\n      font-size: 0.95rem;\n      color: var(--ink);\n      background: white;\n      border: 1px solid var(--line);\n      border-radius: 4px;\n      padding: 12px 14px;\n      transition: border-color 0.2s;\n    }\n    .form-row textarea { resize: vertical; min-height: 100px; }\n    .form-row input:focus,\n    .form-row select:focus,\n    .form-row textarea:focus { outline: none; border-color: var(--teal); }\n    .file-row {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      padding: 12px 14px;\n      background: white;\n      border: 1px dashed var(--line);\n      border-radius: 4px;\n      cursor: pointer;\n      transition: border-color 0.2s, background 0.2s;\n    }\n    .file-row:hover { border-color: var(--teal); background: var(--teal-tint); }\n    .file-row input[type=file] { display: none; }\n    .file-label { font-size: 0.9rem; color: var(--muted); flex: 1; }\n    .file-label strong { color: var(--navy); font-weight: 700; }\n    .submit-btn {\n      width: 100%;\n      background: var(--navy);\n      color: white;\n      font-family: 'Quicksand', sans-serif;\n      font-weight: 700;\n      font-size: 0.95rem;\n      padding: 16px;\n      border: none;\n      border-radius: 999px;\n      cursor: pointer;\n      margin-top: 10px;\n      transition: background 0.2s, transform 0.15s;\n    }\n    .submit-btn:hover:not(:disabled) { background: var(--teal-deep); transform: translateY(-1px); }\n    .submit-btn:disabled { opacity: 0.6; cursor: wait; }\n    .form-status {\n      margin-top: 14px;\n      padding: 12px 16px;\n      border-radius: 4px;\n      font-size: 0.9rem;\n      display: none;\n    }\n    .form-status.success { background: var(--teal-tint); color: var(--navy-deep); display: block; }\n    .form-status.error { background: #fde9e9; color: #a23030; display: block; }\n\n    /* ───── Responsive ───── */\n    @media (max-width: 1080px) {\n      body { padding-top: 84px; }\n      .rail { width: calc(100% - 24px); padding: 8px 10px 8px 18px; }\n      .rail-logo img { height: 32px; }\n      .hero { grid-template-columns: 1fr; gap: 64px; padding: 64px 32px 96px; }\n      .hero-aside { padding-top: 0; }\n      .hero-strip { grid-template-columns: 1fr 1fr; }\n      .hero-strip-item:nth-child(2) { border-right: none; padding-right: 0; }\n      .hero-strip-item:nth-child(3) { padding-left: 0; border-left: none; }\n      .hero-strip-item { padding: 14px 0 !important; border-right: none !important; border-bottom: 1px solid var(--line); }\n      .band-inner, .process-head, .proof-head, .models-head, .focus-head, .cta-inner {\n        grid-template-columns: 1fr; gap: 32px;\n      }\n      .process-grid, .model-grid, .focus-grid { grid-template-columns: 1fr 1fr; }\n      .step:nth-child(odd):not(:first-child) { border-left: none; padding-left: 0; }\n      .step:nth-child(even):not(:first-child) { padding-left: 24px; }\n      .proof-callouts { grid-template-columns: 1fr; gap: 20px; }\n      .chart-row { grid-template-columns: 1fr; gap: 12px; }\n    }\n    @media (max-width: 720px) {\n      .rail { padding: 22px 20px; }\n      .rail-meta { display: none; }\n      .rail-cta { display: none; }\n      .hero, .process, .models, .cta-inner { padding: 56px 20px 80px; }\n      .band, .focus { padding: 64px 0; }\n      .band-inner, .focus-inner { padding: 0 20px; }\n      .proof { padding: 80px 0; }\n      .proof-inner { padding: 0 20px; }\n      .chart { padding: 28px 22px 24px; }\n      .chart-meta { flex-direction: column; gap: 14px; align-items: flex-start; }\n      .bar-row { grid-template-columns: 1fr 70px; gap: 10px; }\n      .model-grid, .process-grid, .focus-grid { grid-template-columns: 1fr; }\n      .step:not(:first-child) { border-left: none; padding-left: 0; border-top: 1px solid var(--line); padding-top: 28px; }\n      .foot-inner { grid-template-columns: 1fr; gap: 28px; padding: 0 20px; }\n      .foot-meta { text-align: left; }\n      .foot-bottom { padding: 22px 20px 0; flex-direction: column; gap: 8px; }\n      .form-row.split { grid-template-columns: 1fr; }\n      .modal { padding: 32px 24px 28px; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  \n\n  <!-- TOP RAIL -->\n  <header class=\"rail\">\n    <a href=\"#\" class=\"rail-logo\">\n      <img src=\"72f1e56e-0969-46e4-aaa7-3f5641929d78\" alt=\"Sourcely Talent\">\n    <\u002Fa>\n    <div class=\"rail-meta\">\n      <div class=\"rail-network\" aria-label=\"Sourcely Talent global network\">\n        <div class=\"rail-cities\">\n          <span class=\"rail-city\"><span class=\"node\"><\u002Fspan>NYC<\u002Fspan>\n          <span class=\"rail-city\"><span class=\"node\"><\u002Fspan>Orlando<\u002Fspan>\n          <span class=\"rail-city\"><span class=\"node\"><\u002Fspan>Barcelona<\u002Fspan>\n          <span class=\"rail-city\"><span class=\"node\"><\u002Fspan>Toronto<\u002Fspan>\n          <span class=\"rail-city\"><span class=\"node\"><\u002Fspan>Bogotá<\u002Fspan>\n          <span class=\"rail-city\"><span class=\"node\"><\u002Fspan>Zurich<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"rail-cta\" data-contact-trigger=\"\">Let's talk<\u002Fbutton>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section class=\"hero\">\n    <div>\n      <div class=\"eyebrow hero-marker\"><span class=\"num\">01<\u002Fspan> Trusted Talent Partners<\u002Fdiv>\n      <h1 class=\"display\">\n        Niche tech talent.<br>\n        <em>Sourc<img class=\"smile-e\" src=\"1b6c5545-d9ce-4536-9ebd-17e1a238f7e8\" alt=\"e\">d with intention.<\u002Fem>\n      <\u002Fh1>\n      <p class=\"hero-tag\">\n        AI-accelerated discovery. Human-led calibration. Partnerships built to last —\n        for tech leaders hiring across engineering, ML/AI, GTM, product, and the C-suite.\n      <\u002Fp>\n      <div class=\"hero-cta-row\">\n        <button class=\"btn-primary\" data-contact-trigger=\"\">\n          Book an intro call\n          <span class=\"arrow\">→<\u002Fspan>\n        <\u002Fbutton>\n        <span class=\"hero-note\">No intake forms. Just a conversation.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <aside class=\"hero-aside\">\n      <div class=\"aside-sticker\" aria-hidden=\"true\">\n        <img src=\"9df43dbe-fc7d-4c6a-a779-b71d0e68987d\" alt=\"\">\n      <\u002Fdiv>\n      <div class=\"quote-card\">\n        <div class=\"quote-mark\">\"<\u002Fdiv>\n        <p class=\"quote-text\">\n          Richie didn't just pitch us. He understood us — and brought the right person before we'd even finished writing the spec.\n        <\u002Fp>\n        <div class=\"quote-attr\">\n          <strong>VP Engineering<\u002Fstrong>\n          Series C SaaS · Hired in 22 days\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <div class=\"hero-strip\">\n      <div class=\"hero-strip-item\">\n        <div class=\"hero-strip-num\"><em>≤7<\u002Fem> days<\u002Fdiv>\n        <div class=\"hero-strip-label\">Time to source<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-strip-item\">\n        <div class=\"hero-strip-num\"><em>≤60<\u002Fem> days<\u002Fdiv>\n        <div class=\"hero-strip-label\">Time to hire<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-strip-item\">\n        <div class=\"hero-strip-num\">10+ yrs<\u002Fdiv>\n        <div class=\"hero-strip-label\">Niche tech experience<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-strip-item\">\n        <div class=\"hero-strip-num\">Seed → Enterprise<\u002Fdiv>\n        <div class=\"hero-strip-label\">Stages we serve<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROMISE BAND — differentiator / deep intake -->\n  <section class=\"band\">\n    <div class=\"band-inner\">\n      <div class=\"band-head\">\n        <div class=\"eyebrow\"><span class=\"num\">02<\u002Fspan> Our Promise<\u002Fdiv>\n        <h2 class=\"band-title\">\n          We don't have clients —<br>we have<br><em>business partn<img class=\"smile-e\" src=\"1b6c5545-d9ce-4536-9ebd-17e1a238f7e8\" alt=\"e\">rs<\u002Fem>.\n        <\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"band-body\">\n        <p>\n          The first conversation is rarely the first thing we do. We come in already knowing\n          who you are, what you're shipping, and where the gaps probably are — so the call\n          itself becomes about <strong>how we make it scale<\u002Fstrong>, not who you are.\n        <\u002Fp>\n        <p>\n          That deep intake on the front end is what changes the rest of the search. We bring\n          data and insights into alignment from day one, then move with the kind of momentum\n          that long relationships are built on. You know what you need.\n          <strong>It's our job to come back with exactly that<\u002Fstrong> — without a second thought.\n        <\u002Fp>\n        <div class=\"band-pull\">\n          A trusted advisor who already knows your business.\n          That's the relationship. The placements are the byproduct.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW WE WORK -->\n  <section class=\"process\">\n    <div class=\"process-head\">\n      <div>\n        <div class=\"eyebrow process-eyebrow\"><span class=\"num\">03<\u002Fspan> How we work<\u002Fdiv>\n        <h2 class=\"process-title\">A search that's<br><em>half-finished<\u002Fem><br>b<img class=\"smile-e\" src=\"1b6c5545-d9ce-4536-9ebd-17e1a238f7e8\" alt=\"e\">fore it begins.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"process-blurb\">\n      Four phases — front-loaded by design. Most of the work is done before\n        a single name is ever surfaced, which is exactly why the back end moves fast.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"process-grid\">\n      <div class=\"step\">\n        <div class=\"step-num\">Phase 01 — Listen<\u002Fdiv>\n        <h3 class=\"step-name\">Deep intake &amp; market mapping.<\u002Fh3>\n        <p class=\"step-desc\">\n          We immerse in the business, the team, the role, and the bar. By the kickoff call we\n          already have a market read — comp data, competitor pipelines, where the talent lives.\n        <\u002Fp>\n        <ul class=\"step-list\">\n          <li>Stakeholder &amp; technical alignment<\u002Fli>\n          <li>Comp + market intelligence<\u002Fli>\n          <li>Competitor &amp; talent landscape map<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">Phase 02 — Calibrate<\u002Fdiv>\n        <h3 class=\"step-name\">Precise calibration.<\u002Fh3>\n        <p class=\"step-desc\">\n          A small batch of qualified “on paper” profiles is shared early — not to interview,\n          but to align. Your feedback sharpens the bar before a single outreach goes out.\n        <\u002Fp>\n        <ul class=\"step-list\">\n          <li>Calibration batch within days of kickoff<\u002Fli>\n          <li>Structured signal &amp; feedback loop<\u002Fli>\n          <li>Bar locked before active sourcing<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">Phase 03 — Source<\u002Fdiv>\n        <h3 class=\"step-name\">AI-accelerated, human-curated.<\u002Fh3>\n        <p class=\"step-desc\">\n          AI compresses the discovery and outreach loop. Humans run every conversation,\n          every read, every recommendation. The shortlist is small, sharp, and personal.\n        <\u002Fp>\n        <ul class=\"step-list\">\n          <li>Surface qualified candidates in ≤7 days<\u002Fli>\n          <li>Personalised outreach &amp; first reads<\u002Fli>\n          <li>Calibrated shortlist — not a longlist<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">Phase 04 — Partner<\u002Fdiv>\n        <h3 class=\"step-name\">Momentum from offer to onboarded.<\u002Fh3>\n        <p class=\"step-desc\">\n          We stay close through close — managing motivations, comp, counter-offers, and\n          start-date logistics. The relationship doesn't end at signature; it's where it starts.\n        <\u002Fp>\n        <ul class=\"step-list\">\n          <li>Offer strategy &amp; close support<\u002Fli>\n          <li>Weekly partner cadence<\u002Fli>\n          <li>Long-term advisory across roles<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TIME-TO-SOURCE PROOF -->\n  <section class=\"proof\">\n    <div class=\"proof-inner\">\n      <div class=\"proof-head\">\n        <div>\n          <div class=\"eyebrow on-dark\"><span class=\"num\">04<\u002Fspan> The proof<\u002Fdiv>\n          <h2 class=\"proof-title\">\n            Half the tim<img class=\"smile-e\" src=\"1b6c5545-d9ce-4536-9ebd-17e1a238f7e8\" alt=\"e\">. <em>Twice the fit.<\u002Fem>\n          <\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"proof-blurb\">\n          Time-to-source is the metric — how fast a qualified candidate hits the active pipeline\n          from the moment a req opens. Industry benchmarks are slow. We're not.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Comparison chart -->\n      <div class=\"chart\" id=\"ttsChart\">\n        <div class=\"chart-meta\">\n          <div class=\"chart-meta-label\">Time-to-source · days to first qualified candidate<\u002Fdiv>\n          <div class=\"chart-legend\">\n            <div class=\"chart-legend-item\"><span class=\"chart-legend-swatch industry\"><\u002Fspan>Industry benchmark<\u002Fdiv>\n            <div class=\"chart-legend-item\"><span class=\"chart-legend-swatch sourcely\"><\u002Fspan>Sourcely Talent<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"chart-row\">\n          <div class=\"chart-label\">\n            <div class=\"chart-label-name\">General tech roles<\u002Fdiv>\n            <div class=\"chart-label-sub\">SWE · Data · DevOps<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chart-bars\">\n            <div class=\"bar-row\">\n              <div class=\"bar-track\"><div class=\"bar-fill industry\" data-pct=\"40\">&nbsp;<\u002Fdiv><\u002Fdiv>\n              <div class=\"bar-value\">10–20 days<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bar-row\">\n              <div class=\"bar-track\"><div class=\"bar-fill sourcely\" data-pct=\"14\">&nbsp;<\u002Fdiv><\u002Fdiv>\n              <div class=\"bar-value sourcely\">≤ 7 days<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"chart-row\">\n          <div class=\"chart-label\">\n            <div class=\"chart-label-name\">Specialized &amp; niche<\u002Fdiv>\n            <div class=\"chart-label-sub\">ML · NLP · AI engineering<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chart-bars\">\n            <div class=\"bar-row\">\n              <div class=\"bar-track\"><div class=\"bar-fill industry\" data-pct=\"70\">&nbsp;<\u002Fdiv><\u002Fdiv>\n              <div class=\"bar-value\">20–35 days<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bar-row\">\n              <div class=\"bar-track\"><div class=\"bar-fill sourcely\" data-pct=\"20\">&nbsp;<\u002Fdiv><\u002Fdiv>\n              <div class=\"bar-value sourcely\">≤ 12 days<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"chart-row\">\n          <div class=\"chart-label\">\n            <div class=\"chart-label-name\">Highly niche<\u002Fdiv>\n            <div class=\"chart-label-sub\">Multilingual NLP · specific stack<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chart-bars\">\n            <div class=\"bar-row\">\n              <div class=\"bar-track\"><div class=\"bar-fill industry\" data-pct=\"90\">&nbsp;<\u002Fdiv><\u002Fdiv>\n              <div class=\"bar-value\">30–45+ days<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bar-row\">\n              <div class=\"bar-track\"><div class=\"bar-fill sourcely\" data-pct=\"30\">&nbsp;<\u002Fdiv><\u002Fdiv>\n              <div class=\"bar-value sourcely\">≤ 16 days<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"chart-footnote\">\n          <strong>Time-to-source<\u002Fstrong> measures how long it takes to identify and surface\n          a qualified candidate — from the moment a req is opened to the moment a candidate\n          enters the active pipeline. Sourcely cuts this in half (or more) by combining AI-driven\n          discovery with human-led calibration. Industry ranges reflect public benchmarks for niche tech roles.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Callouts -->\n      <div class=\"proof-callouts\">\n        <div class=\"callout\">\n          <div class=\"callout-num\"><em>≤7<\u002Fem><small> days<\u002Fsmall><\u002Fdiv>\n          <div class=\"callout-label\">Time to source<\u002Fdiv>\n          <div class=\"callout-desc\">First qualified candidate, every search.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"callout\">\n          <div class=\"callout-num\"><em>≤60<\u002Fem><small> days<\u002Fsmall><\u002Fdiv>\n          <div class=\"callout-label\">Time to hire<\u002Fdiv>\n          <div class=\"callout-desc\">From kickoff to signed offer letter.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"callout\">\n          <div class=\"callout-num\"><em>2×<\u002Fem><small> faster<\u002Fsmall><\u002Fdiv>\n          <div class=\"callout-label\">Vs. industry<\u002Fdiv>\n          <div class=\"callout-desc\">On the same calibre of niche tech role.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ENGAGEMENT MODELS -->\n  <section class=\"models\">\n    <div class=\"models-head\">\n      <div>\n        <div class=\"eyebrow models-eyebrow\"><span class=\"num\">05<\u002Fspan> Engagement<\u002Fdiv>\n        <h2 class=\"models-title\">Four ways to<br><em><img class=\"smile-e\" src=\"1b6c5545-d9ce-4536-9ebd-17e1a238f7e8\" alt=\"e\">ngage<\u002Fem>.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"models-blurb\">\n        Each engagement is shaped around your stage, urgency, and team — not a fixed template.\n        Pick the model that fits, or we'll help you decide on the call.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"model-grid\">\n      <div class=\"model\">\n        <div class=\"model-num\">01 — Engaged<\u002Fdiv>\n        <div class=\"model-name\">Engaged search.<\u002Fdiv>\n        <p class=\"model-desc\">\n          Dedicated, in-depth search for specialized and senior individual-contributor roles\n          where fit, depth, and speed all matter.\n        <\u002Fp>\n        <div class=\"model-meta\">\n          For\n          <div class=\"model-meta-sub\">Tech-specialist hires · Sr ICs · platform leads<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"model\">\n        <div class=\"model-num\">02 — Executive<\u002Fdiv>\n        <div class=\"model-name\">Executive search.<\u002Fdiv>\n        <p class=\"model-desc\">\n          Confidential, partner-led searches for C-suite, VP, and director-level leaders —\n          including head-of-function and first-in-seat hires.\n        <\u002Fp>\n        <div class=\"model-meta\">\n          For\n          <div class=\"model-meta-sub\">CTO · CPO · VP Eng · Head of Talent<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"model\">\n        <div class=\"model-num\">03 — Sourcing<\u002Fdiv>\n        <div class=\"model-name\">Sourcing-only.<\u002Fdiv>\n        <p class=\"model-desc\">\n          Calibrated pipeline straight to your inbox. We find and qualify;\n          your team runs interviews and closes.\n        <\u002Fp>\n        <div class=\"model-meta\">\n          For\n          <div class=\"model-meta-sub\">In-house TA teams · sprint hiring · pipeline gaps<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"model\">\n        <div class=\"model-num\">04 — Advisory<\u002Fdiv>\n        <div class=\"model-name\">Talent advisory.<\u002Fdiv>\n        <p class=\"model-desc\">\n          Strategic counsel for talent leaders — comp benchmarking, market mapping,\n          org design, hiring strategy, and pipeline architecture.\n        <\u002Fp>\n        <div class=\"model-meta\">\n          For\n          <div class=\"model-meta-sub\">CPOs · Heads of Talent · founders scaling<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOCUS / SPECIALTIES -->\n  <section class=\"focus\">\n    <div class=\"focus-inner\">\n      <div class=\"focus-head\">\n        <div>\n          <div class=\"eyebrow focus-eyebrow\"><span class=\"num\">06<\u002Fspan> Where we focus<\u002Fdiv>\n          <h2 class=\"focus-title\">Tech-specific.<br><em>Globally n<img class=\"smile-e\" src=\"1b6c5545-d9ce-4536-9ebd-17e1a238f7e8\" alt=\"e\">tworked.<\u002Fem><\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"focus-blurb\">\n          A decade-deep network across engineering, ML/AI, GTM, product, and executive leadership —\n          for companies between Seed and Enterprise.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"focus-grid\">\n        <div class=\"focus-row\">\n          <div class=\"focus-row-num\">01<\u002Fdiv>\n          <div>\n            <div class=\"focus-row-name\">Engineering &amp; Infrastructure<\u002Fdiv>\n            <div class=\"focus-row-tags\">Backend · Platform · ML/AI · NLP · Data · DevOps · Security<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"focus-row\">\n          <div class=\"focus-row-num\">02<\u002Fdiv>\n          <div>\n            <div class=\"focus-row-name\">Executive Leadership<\u002Fdiv>\n            <div class=\"focus-row-tags\">CTO · CPO · CRO · VP Eng · VP Product · VP Talent<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"focus-row\">\n          <div class=\"focus-row-num\">03<\u002Fdiv>\n          <div>\n            <div class=\"focus-row-name\">Go-to-Market<\u002Fdiv>\n            <div class=\"focus-row-tags\">Enterprise sales · Solutions · Partnerships · Marketing leadership<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"focus-row\">\n          <div class=\"focus-row-num\">04<\u002Fdiv>\n          <div>\n            <div class=\"focus-row-name\">Industries we serve<\u002Fdiv>\n            <div class=\"focus-row-tags\">Enterprise SaaS · Biotech · Pharma · Fintech · Seed → Series C<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section class=\"cta-band\">\n    <div class=\"cta-inner\">\n      <div>\n        <div class=\"cta-headline\">\n          <div class=\"cta-mark\" aria-hidden=\"true\">\n            <img src=\"9df43dbe-fc7d-4c6a-a779-b71d0e68987d\" alt=\"Sourcely Talent\">\n          <\u002Fdiv>\n          <h2>\n            Let's start a <em>conversation<\u002Fem>,<br>not a contract.\n          <\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"cta-lede\">\n          Tell us what you're building. We'll come to the first call already knowing\n          where to look — and ready to learn what makes your team different.\n        <\u002Fp>\n        <div class=\"cta-band-row\">\n          <button class=\"btn-primary\" data-contact-trigger=\"\">\n            Book an intro call\n            <span class=\"arrow\">→<\u002Fspan>\n          <\u002Fbutton>\n          <span class=\"cta-note\">We'll be in touch within one business day.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <aside class=\"cta-side\">\n        <div class=\"cta-side-eyebrow\">What to expect<\u002Fdiv>\n        <div class=\"cta-side-title\">A 30-minute working session — not a sales pitch.<\u002Fdiv>\n        <ul class=\"cta-side-list\">\n          <li>We come prepared. We've already studied your team, market, and stack.<\u002Fli>\n          <li>You walk us through the bar, the role, the urgency, and the unknowns.<\u002Fli>\n          <li>You leave with a market read, a comp range, and a recommended path forward — engagement or no.<\u002Fli>\n        <\u002Ful>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer>\n    <div class=\"foot-inner\">\n      <div class=\"foot-mark\">\n        <div class=\"foot-logo\">\n          <img src=\"72f1e56e-0969-46e4-aaa7-3f5641929d78\" alt=\"Sourcely Talent\">\n        <\u002Fdiv>\n        <div class=\"foot-tag\">Human first. AI behind every introduction. People-first, always.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"foot-meta\">\n        <div class=\"foot-locations\">\n          NYC <span>·<\u002Fspan> Orlando <span>·<\u002Fspan> Barcelona <span>·<\u002Fspan> Toronto <span>·<\u002Fspan> Bogotá <span>·<\u002Fspan> Zurich\n        <\u002Fdiv>\n        <a href=\"mailto:info@sourcelytalent.com\">info@sourcelytalent.com<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span>© 2026 Sourcely Talent<\u002Fspan>\n      <span>People first, always.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- CONTACT MODAL -->\n  <div class=\"modal-overlay\" id=\"contactModal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"contactTitle\">\n    <div class=\"modal\">\n      <button type=\"button\" class=\"modal-close\" id=\"closeModal\" aria-label=\"Close\">✕<\u002Fbutton>\n      <div class=\"modal-title-row\">\n        <img src=\"e0097063-ef7f-43da-8190-e923d796075e\" alt=\"\" aria-hidden=\"true\">\n        <h2 id=\"contactTitle\">Let's talk.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"modal-sub\">Tell us a little about what you're working on — we'll be in touch within one business day.<\u002Fp>\n      <form id=\"contactForm\" autocomplete=\"on\">\n        <input type=\"hidden\" name=\"access_key\" value=\"YOUR_ACCESS_KEY_HERE\">\n        <input type=\"hidden\" name=\"subject\" value=\"New inquiry from sourcelytalent.com\">\n        <input type=\"hidden\" name=\"from_name\" value=\"Sourcely Talent Website\">\n        <input type=\"checkbox\" name=\"botcheck\" style=\"display:none\" tabindex=\"-1\" autocomplete=\"off\">\n        <div class=\"form-row split\">\n          <div><label for=\"name\">Your name<\u002Flabel><input type=\"text\" id=\"name\" name=\"name\" required=\"\"><\u002Fdiv>\n          <div><label for=\"email\">Email<\u002Flabel><input type=\"email\" id=\"email\" name=\"email\" required=\"\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-row split\">\n          <div><label for=\"company\">Company <span class=\"opt\">(optional)<\u002Fspan><\u002Flabel><input type=\"text\" id=\"company\" name=\"company\"><\u002Fdiv>\n          <div>\n            <label for=\"model\">Engagement<\u002Flabel>\n            <select id=\"model\" name=\"engagement\">\n              <option value=\"Not sure yet\">Not sure yet<\u002Foption>\n              <option value=\"Engaged\">Engaged search<\u002Foption>\n              <option value=\"Executive\">Executive search<\u002Foption>\n              <option value=\"Sourcing-only\">Sourcing-only<\u002Foption>\n              <option value=\"Advisory\">Talent advisory<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <label for=\"message\">Message<\u002Flabel>\n          <textarea id=\"message\" name=\"message\" required=\"\" placeholder=\"What roles are you thinking about? Where are you in the process?\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <label>Attachment <span class=\"opt\">(optional — job spec, brief, max 10MB)<\u002Fspan><\u002Flabel>\n          <label class=\"file-row\" for=\"attachment\">\n            <span class=\"file-label\" id=\"fileLabel\"><strong>Choose a file<\u002Fstrong> or leave blank<\u002Fspan>\n            <input type=\"file\" id=\"attachment\" name=\"attachment\" accept=\".pdf,.doc,.docx,.txt,.rtf,.png,.jpg,.jpeg,.gif\">\n          <\u002Flabel>\n        <\u002Fdiv>\n        <button type=\"submit\" class=\"submit-btn\" id=\"submitBtn\">Send message<\u002Fbutton>\n        <div class=\"form-status\" id=\"formStatus\"><\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n    // ── Modal ──\n    const modal = document.getElementById('contactModal');\n    const closeBtn = document.getElementById('closeModal');\n    const fileInput = document.getElementById('attachment');\n    const fileLabel = document.getElementById('fileLabel');\n    const form = document.getElementById('contactForm');\n    const submitBtn = document.getElementById('submitBtn');\n    const status = document.getElementById('formStatus');\n\n    function openModal() {\n      modal.classList.add('open');\n      document.body.style.overflow = 'hidden';\n      setTimeout(() => document.getElementById('name').focus(), 200);\n    }\n    function closeModal() {\n      modal.classList.remove('open');\n      document.body.style.overflow = '';\n    }\n    document.querySelectorAll('[data-contact-trigger]').forEach(el => {\n      el.addEventListener('click', e => { e.preventDefault(); openModal(); });\n    });\n    closeBtn.addEventListener('click', closeModal);\n    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });\n    document.addEventListener('keydown', e => {\n      if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();\n    });\n\n    fileInput.addEventListener('change', () => {\n      const f = fileInput.files[0];\n      if (!f) { fileLabel.innerHTML = '<strong>Choose a file<\u002Fstrong> or leave blank'; return; }\n      if (f.size > 10 * 1024 * 1024) {\n        fileLabel.innerHTML = '<strong style=\"color:#a23030\">File too large (max 10MB)<\u002Fstrong>';\n        fileInput.value = '';\n        return;\n      }\n      fileLabel.innerHTML = '<strong>' + f.name + '<\u002Fstrong> · ' + (f.size/1024/1024).toFixed(2) + ' MB';\n    });\n\n    form.addEventListener('submit', async e => {\n      e.preventDefault();\n      status.className = 'form-status';\n      submitBtn.disabled = true;\n      submitBtn.textContent = 'Sending…';\n      const data = new FormData(form);\n      try {\n        const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: data });\n        const json = await res.json();\n        if (res.ok && json.success) {\n          status.textContent = 'Thanks — we got it. We\\u2019ll be in touch within one business day.';\n          status.className = 'form-status success';\n          form.reset();\n          fileLabel.innerHTML = '<strong>Choose a file<\u002Fstrong> or leave blank';\n          setTimeout(closeModal, 2200);\n        } else {\n          throw new Error(json.message || 'Something went wrong.');\n        }\n      } catch (err) {\n        status.textContent = 'Couldn\\u2019t send right now. Please email info@sourcelytalent.com directly.';\n        status.className = 'form-status error';\n      } finally {\n        submitBtn.disabled = false;\n        submitBtn.textContent = 'Send message';\n      }\n    });\n\n    // ── Floating nav scrolled state ──\n    const rail = document.querySelector('.rail');\n    if (rail) {\n      const onScroll = () => rail.classList.toggle('scrolled', window.scrollY > 24);\n      window.addEventListener('scroll', onScroll, { passive: true });\n      onScroll();\n    }\n\n    // ── Animate the time-to-source bars on scroll ──\n    const chart = document.getElementById('ttsChart');\n    if (chart && 'IntersectionObserver' in window) {\n      const fills = chart.querySelectorAll('.bar-fill');\n      const io = new IntersectionObserver(entries => {\n        entries.forEach(entry => {\n          if (entry.isIntersecting) {\n            fills.forEach(f => { f.style.width = f.dataset.pct + '%'; });\n            io.disconnect();\n          }\n        });\n      }, { threshold: 0.25 });\n      io.observe(chart);\n    } else if (chart) {\n      chart.querySelectorAll('.bar-fill').forEach(f => { f.style.width = f.dataset.pct + '%'; });\n    }\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
